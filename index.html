<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANAV | CLOUD-OS APP</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --aws-orange: #FF9900; --deep-navy: #0F172A; }
        body { background: var(--deep-navy); color: #E2E8F0; font-family: sans-serif; }
        .app-card { background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(255,153,0,0.2); }
        .boot-btn { background: var(--aws-orange); color: black; font-weight: 900; padding: 20px; border-radius: 15px; width: 100%; box-shadow: 0 0 20px rgba(255,153,0,0.4); }
    </style>
</head>
<body class="p-6 min-h-screen">

    <header class="max-w-4xl mx-auto mb-8 text-center">
        <h1 class="text-3xl font-black italic text-white uppercase">Manav.Cloud <span class="text-[#FF9900]">App</span></h1>
        <p id="live-clock" class="text-5xl font-mono font-bold text-[#FF9900] mt-4">00:00:00</p>
        <div class="mt-6">
            <button onclick="bootSystem()" id="boot-text" class="boot-btn uppercase tracking-widest">🚀 Boot System (Enable Alarm)</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto grid grid-cols-1 gap-6">
        <div class="app-card overflow-hidden h-[300px]">
             <div class="p-3 bg-slate-800 text-[10px] font-bold uppercase tracking-widest text-[#FF9900]">Live_Match_Monitor</div>
             <iframe src="https://www.bing.com/search?q=live+cricket+score" class="w-full h-full border-none opacity-80 contrast-125 brightness-75 grayscale invert"></iframe>
        </div>

        <div class="app-card p-8 min-h-[400px]">
            <h2 class="text-2xl font-black text-white mb-4 uppercase italic" id="task-title">Awaiting Launch</h2>
            <div id="mission-body-text" class="text-sm text-slate-400 italic mb-6">Launch starts April 4th.</div>
            <textarea id="lab-input" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl text-cyan-400 font-mono mb-4 h-24" placeholder="Paste logs..."></textarea>
            <button onclick="submitToGemini()" class="w-full bg-slate-700 py-4 rounded-xl font-bold uppercase text-[10px] tracking-widest text-white">Execute Audit</button>
        </div>
    </main>

    <audio id="alarm-buzzer" src="https://assets.mixkit.co/sfx/preview/mixkit-digital-clock-digital-alarm-buzzer-992.mp3" preload="auto" loop></audio>

    <script>
        let GEMINI_API_KEY = localStorage.getItem('manav_ai_key') || "";
        let systemArmed = false;

        // 1. BOOT SYSTEM (MANDATORY FOR SOUND)
        function bootSystem() {
            const buzzer = document.getElementById('alarm-buzzer');
            buzzer.play().then(() => {
                buzzer.pause(); // Effectively "Unmutes" the browser
                systemArmed = true;
                document.getElementById('boot-text').innerText = "✅ SYSTEM ARMED (ALARM AT 13:10)";
                document.getElementById('boot-text').style.background = "#22c55e";
            }).catch(e => alert("Please click again to arm system."));
        }

        // 2. CLOCK & 13:10 TRIGGER
        setInterval(() => {
            const now = new Date();
            const time = now.toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('live-clock').innerText = time;

            if(time === "13:10:00" && systemArmed) {
                const buzzer = document.getElementById('alarm-buzzer');
                buzzer.play();
                
                // Open WhatsApp
                const wa = window.open("https://wa.me/918849544704?text=🦁%20Work%20Completed?", "_blank");
                if(!wa) alert("POPUP BLOCKED! Enable popups for WhatsApp automation.");
                
                setTimeout(() => buzzer.pause(), 15000);
            }
        }, 1000);

        // 3. NEWS & GEMINI (Same as before)
        function activateAI() {
            const key = prompt("Key:");
            if(key) localStorage.setItem('manav_ai_key', key);
        }
        
        // PWA Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
