<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANAV | CLOUD-OS MASTERY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --slate: #0F172A; --white: #F8FAFC; }
        body { background-color: var(--slate); color: var(--white); font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .cmd-box { border-left: 4px solid var(--gold); background: rgba(212, 175, 55, 0.05); padding: 15px; margin-bottom: 15px; border-radius: 0 12px 12px 0; }
        .quiz-btn { width: 100%; text-align: left; padding: 15px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin-bottom: 10px; transition: 0.3s; }
        .quiz-btn:hover { background: rgba(212, 175, 55, 0.2); border-color: var(--gold); }
        .progress-line { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-inner { height: 100%; background: var(--gold); transition: 1s ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen">

    <header class="max-w-6xl mx-auto flex justify-between items-end mb-12">
        <div>
            <h1 class="text-4xl font-black tracking-tighter uppercase italic">Mastery <span class="text-[#D4AF37]">730</span></h1>
            <div class="flex gap-4 mt-2">
                <span class="text-[10px] font-bold uppercase tracking-widest opacity-60">Step: <span id="lvl-curr">1</span> / 730</span>
                <span class="text-[10px] font-bold uppercase tracking-widest text-[#D4AF37]">Candidate: Manav Mehta</span>
            </div>
        </div>
        <div class="text-right">
            <p id="live-clock" class="text-4xl font-mono font-bold tracking-tighter">00:00:00</p>
        </div>
    </header>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="glass-card p-6">
                <h3 class="text-xs font-black uppercase tracking-widest mb-4 opacity-50">Career_Velocity</h3>
                <div class="progress-line mb-2"><div id="prog-bar" class="progress-inner" style="width: 0.1%"></div></div>
                <p class="text-[10px] font-bold uppercase text-[#D4AF37]">Certification Readiness: 1%</p>
            </div>

            <div class="flex gap-4">
                <button onclick="prevStep()" class="flex-1 py-3 border border-white/10 rounded-xl text-[10px] font-black uppercase hover:border-[#D4AF37] transition-all">Back</button>
                <button onclick="resetData()" class="flex-1 py-3 border border-red-900/30 text-red-500 rounded-xl text-[10px] font-black uppercase hover:bg-red-500/10">Reset</button>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="glass-card p-8 md:p-12 min-h-[800px] flex flex-col">
                <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
                    <span id="step-id" class="text-[#D4AF37] text-xs font-black uppercase tracking-[0.4em]">Step_001</span>
                    <span id="mod-name" class="text-[10px] font-bold uppercase opacity-40 italic">Module: Linux_Core_Architect</span>
                </div>

                <div class="flex-grow">
                    <h2 id="step-title" class="text-4xl font-black mb-10 tracking-tight uppercase italic">Loading_Sequence...</h2>
                    
                    <div id="command-container" class="space-y-6">
                        </div>

                    <div id="quiz-section" class="mt-12 pt-10 border-t border-white/10">
                        <h4 class="text-[#D4AF37] font-black uppercase text-xs mb-6 italic">Validation: Knowledge Check</h4>
                        <p id="quiz-q" class="text-lg font-bold mb-6 italic leading-snug"></p>
                        <div id="quiz-options" class="space-y-3 text-sm">
                            </div>
                    </div>
                </div>

                <div class="mt-12 text-center">
                    <p class="text-[10px] opacity-30 uppercase tracking-widest font-bold">Pick the correct answer to unlock the next level</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const database = [
            {
                id: 1, mod: "Kernel_Fundamentals", title: "The Security Guard (Sudo)",
                commands: [
                    { name: "whoami", def: "Displays the current active username.", usage: "Used to verify if you are accidentally running commands as root.", importance: "Critical for audit logs in AWS." },
                    { name: "sudo", def: "SuperUser Do - Executes commands with root privileges.", usage: "Used to install software or change system files.", importance: "Amazon's security rule #1: Only use sudo when absolutely needed." },
                    { name: "sudo -i", def: "Enters an interactive root shell.", usage: "Used for massive system overhauls.", importance: "High risk. Avoid this in production environments." }
                ],
                quiz: "Why does an AWS Cloud Engineer prefer 'sudo' over logging in as 'root'?",
                options: ["A) Root is slower than sudo", "B) Sudo provides an audit trail of who did what", "C) Sudo is cheaper for cloud bills"],
                correct: 1 // Option B
            },
            {
                id: 2, mod: "System_Diagnostics", title: "Navigation & Paths",
                commands: [
                    { name: "pwd", def: "Print Working Directory.", usage: "Shows exactly where you are in the system.", importance: "Prevents accidental file deletion in the wrong folder." },
                    { name: "ls -la", def: "List All files (including hidden).", usage: "Shows system configuration files like .bashrc.", importance: "Essential for debugging hidden cloud configs." },
                    { name: "cd /var/log", def: "Moves to the system log directory.", usage: "Where AWS Linux stores all error messages.", importance: "The first place you go when a server crashes." }
                ],
                quiz: "Which command would you use to find the error logs on an AWS server?",
                options: ["A) whoami", "B) ls -la /root", "C) cd /var/log"],
                correct: 2 // Option C
            }
        ];

        let currIdx = parseInt(localStorage.getItem('manav_step_idx')) || 0;

        function render() {
            const data = database[currIdx] || database[database.length - 1];
            document.getElementById('lvl-curr').innerText = currIdx + 1;
            document.getElementById('step-id').innerText = `Step_${String(data.id).padStart(3, '0')}`;
            document.getElementById('mod-name').innerText = `Module: ${data.mod}`;
            document.getElementById('step-title').innerText = data.title;
            
            // Render Commands
            let cmdHtml = '';
            data.commands.forEach(c => {
                cmdHtml += `
                    <div class="cmd-box">
                        <p class="text-[#D4AF37] font-black text-lg font-mono mb-2"># ${c.name}</p>
                        <p class="text-sm opacity-90 mb-1"><strong>Definition:</strong> ${c.def}</p>
                        <p class="text-sm opacity-90 mb-1 font-italic italic"><strong>Real-Life Usage:</strong> ${c.usage}</p>
                        <p class="text-[11px] text-blue-400 font-bold uppercase tracking-widest mt-2"><strong>Importance:</strong> ${c.importance}</p>
                    </div>`;
            });
            document.getElementById('command-container').innerHTML = cmdHtml;

            // Render Quiz
            document.getElementById('quiz-q').innerText = data.quiz;
            let optHtml = '';
            data.options.forEach((opt, index) => {
                optHtml += `<button onclick="checkAns(${index})" class="quiz-btn">${opt}</button>`;
            });
            document.getElementById('quiz-options').innerHTML = optHtml;

            // Progress
            const perc = (((currIdx + 1) / 730) * 100).toFixed(2);
            document.getElementById('prog-bar').style.width = perc + "%";
        }

        function checkAns(idx) {
            if(idx === database[currIdx].correct) {
                alert("✓ CORRECT: Knowledge Verified. Proceeding to Next Step.");
                currIdx++;
                localStorage.setItem('manav_step_idx', currIdx);
                render();
                window.scrollTo(0,0);
            } else {
                alert("✘ INCORRECT: Re-read the Command Importance and try again.");
            }
        }

        function prevStep() {
            if(currIdx > 0) {
                currIdx--;
                localStorage.setItem('manav_step_idx', currIdx);
                render();
            }
        }

        function resetData() {
            if(confirm("Confirm Master Reset? All progress will be lost.")) {
                localStorage.setItem('manav_step_idx', 0);
                location.reload();
            }
        }

        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        window.onload = render;
    </script>
</body>
</html>
