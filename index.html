<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevSecOps 720 | ManavMehta.cloud</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#D4AF37">

<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{--gold:#D4AF37;}
body{background:#020617;color:white;font-family:Arial;}
.glass{background:#0f172a;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:20px;}
.btn{background:var(--gold);color:black;padding:12px;border-radius:12px;font-weight:900;}
.section{border-left:4px solid var(--gold);padding:15px;margin:15px 0;background:#111827;border-radius:12px;}
.command{background:#000;padding:12px;border-radius:10px;margin-top:10px;}
.tab{padding:10px;background:#111827;border-radius:10px;cursor:pointer;}
.tab.active{background:var(--gold);color:black;}
</style>
</head>

<body class="p-4">

<h1 class="text-3xl font-black mb-4">🔥 DevSecOps 720</h1>

<div class="flex gap-2 mb-4">
<button class="tab active" onclick="tab('learn')">Learn</button>
<button class="tab" onclick="tab('projects')">Projects</button>
<button class="tab" onclick="tab('interview')">Interview</button>
<button class="tab" onclick="tab('profile')">Profile</button>
<button class="tab" onclick="tab('report')">Report</button>
</div>

<div id="learn">

<div class="glass">
<p>Level: <span id="lvl"></span> / 720</p>
<p>XP: <span id="xp"></span></p>
<p>Streak: <span id="streak"></span></p>
</div>

<div class="section">
<h3>🎯 Mission</h3>
<p id="mission"></p>
</div>

<div class="section">
<h3>📘 Concept</h3>
<p id="concept"></p>
</div>

<div class="section">
<h3>💻 Commands</h3>
<div id="cmds"></div>
</div>

<div class="section">
<h3>🧪 Lab Checklist</h3>
<label><input type="checkbox" onchange="check(0)"> Practice Commands</label><br>
<label><input type="checkbox" onchange="check(1)"> Complete Lab</label><br>
<label><input type="checkbox" onchange="check(2)"> GitHub Upload</label><br>
<label><input type="checkbox" onchange="check(3)"> Reflection</label>
</div>

<div class="section">
<h3>🧠 Quiz</h3>
<p id="q"></p>
<div id="opts"></div>
</div>

<div class="section">
<h3>📝 Reflection</h3>
<textarea id="ref"></textarea>
<button class="btn mt-2" onclick="saveRef()">Save</button>
</div>

<button class="btn w-full mt-4" onclick="next()">Complete Level</button>

</div>

<div id="projects" style="display:none">
<h2 class="text-xl font-bold">Projects</h2>
<div id="proj"></div>
</div>

<div id="interview" style="display:none">
<h2 class="text-xl font-bold">Interview</h2>
<p id="iq"></p>
<button class="btn" onclick="showAns()">Show Answer</button>
<p id="ia"></p>
</div>

<div id="profile" style="display:none">
<h2 class="text-xl font-bold">Profile</h2>
<p>Level: <span id="pl"></span></p>
<p>XP: <span id="px"></span></p>
</div>

<div id="report" style="display:none">
<h2 class="text-xl font-bold">Weekly Report</h2>
<p id="rep"></p>
</div>

<script>

let lvl=localStorage.getItem("lvl")||1;
let xp=localStorage.getItem("xp")||0;
let streak=localStorage.getItem("streak")||0;

const data=[
{
mission:"Understand Linux identity",
concept:"Users, groups, sudo",
cmds:[
{c:"whoami",d:"Current user",u:"Check login"},
{c:"id",d:"User details",u:"Check permission"},
{c:"groups",d:"Groups list",u:"Access check"},
{c:"sudo -l",d:"Sudo rights",u:"Admin audit"}
],
q:"Why sudo?",
o:["Speed","Security","Games"],a:1
},
{
mission:"Learn filesystem",
concept:"Folders structure",
cmds:[
{c:"pwd",d:"Current path",u:"Location check"},
{c:"ls",d:"List files",u:"See files"},
{c:"cd",d:"Change dir",u:"Navigate"},
{c:"mkdir",d:"Create folder",u:"Organize"}
],
q:"Where logs?",
o:["/var/log","/games","/etc"],a:0
}
];

function render(){
let d=data[(lvl-1)%data.length];
document.getElementById("lvl").innerText=lvl;
document.getElementById("xp").innerText=xp;
document.getElementById("streak").innerText=streak;
document.getElementById("mission").innerText=d.mission;
document.getElementById("concept").innerText=d.concept;

let h="";
d.cmds.forEach(c=>{
h+=`<div class="command">
<b>$ ${c.c}</b><br>
Def: ${c.d}<br>
Use: ${c.u}
</div>`;
});
document.getElementById("cmds").innerHTML=h;

document.getElementById("q").innerText=d.q;
let op="";
d.o.forEach((o,i)=>op+=`<button onclick="quiz(${i})">${o}</button><br>`);
document.getElementById("opts").innerHTML=op;

document.getElementById("pl").innerText=lvl;
document.getElementById("px").innerText=xp;

document.getElementById("rep").innerText=
"Levels done: "+lvl+" XP: "+xp;
}

function quiz(i){
let d=data[(lvl-1)%data.length];
alert(i==d.a?"Correct":"Wrong");
}

function next(){
lvl++;xp=parseInt(xp)+100;streak++;
localStorage.setItem("lvl",lvl);
localStorage.setItem("xp",xp);
localStorage.setItem("streak",streak);
render();
}

function saveRef(){
localStorage.setItem("ref"+lvl,document.getElementById("ref").value);
}

function check(i){
localStorage.setItem("chk"+lvl+i,true);
}

function tab(t){
["learn","projects","interview","profile","report"].forEach(x=>document.getElementById(x).style.display="none");
document.getElementById(t).style.display="block";
}

function showAns(){
document.getElementById("ia").innerText="Security + audit trail";
}

render();

</script>

</body>
</html>
